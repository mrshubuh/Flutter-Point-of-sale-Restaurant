name: Build POS Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' 

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Kita kunci di versi 3.22.2 agar sesuai dengan pubspec.yaml aplikasi ini
          flutter-version: '3.22.2' 
          channel: 'stable' 

      - name: 📦 Install Dependencies
        run: flutter pub get

      # SCRIPT PENYELAMAT: Mengupdate Kotlin & Gradle secara otomatis
      - name: 🔧 Auto-Fix Android Gradle & Kotlin
        run: |
          sed -i "s/ext.kotlin_version = '[0-9.]*'/ext.kotlin_version = '1.9.0'/g" android/build.gradle || true
          sed -i "s/gradle-[0-9.]*-[a-z]*.zip/gradle-8.3-all.zip/g" android/gradle/wrapper/gradle-wrapper.properties || true

      - name: ⚙️ Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🛠️ Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-POS-Resto-Offline
          path: build/app/outputs/flutter-apk/app-release.apk
